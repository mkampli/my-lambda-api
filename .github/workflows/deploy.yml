# .github/workflows/deploy.yml
#
# GitHub Actions CI/CD Pipeline
# Automatically deploys your Lambda function every time you push to main.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID       — from your IAM user
#   AWS_SECRET_ACCESS_KEY   — from your IAM user
#   AWS_REGION              — e.g. us-east-1
#   LAMBDA_FUNCTION_NAME    — e.g. hello-world-api

name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main          # Triggers on every push to main
  workflow_dispatch:  # Also allows manual trigger from GitHub UI

jobs:
  test:
    name: Run Local Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run local tests
        run: python test_local.py

  deploy:
    name: Deploy to Lambda
    runs-on: ubuntu-latest
    needs: test           # Only runs if 'test' job passes
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies into package
        run: |
          mkdir -p package
          if [ -f requirements.txt ] && grep -v "^#" requirements.txt | grep -q "."; then
            pip install -r requirements.txt -t package/
          fi
          # Copy Lambda handler into package
          cp lambda_function.py package/

      - name: Zip the deployment package
        run: |
          cd package
          zip -r ../function.zip .
          cd ..
          echo "Zip created. Size: $(du -sh function.zip | cut -f1)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://function.zip

      - name: Wait for Lambda to finish updating
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Verify deployment (invoke Lambda)
        run: |
          RESPONSE=$(aws lambda invoke \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --payload '{"httpMethod":"GET","path":"/hello","queryStringParameters":{"name":"CI"},"body":null}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/response.json \
            --query StatusCode \
            --output text)

          echo "Lambda invocation status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "Deployment verification failed!"
            exit 1
          fi

          echo "Deployment successful!"
